<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>
</head>
<body style="font-family:Arial; text-align:center;">

<h1>📋 Student List (100–300)</h1>

<table border="1" align="center" cellpadding="10">
<tr>
   
    <th>RollNo</th>
    <th>Name</th>
    <th>Branch</th>
</tr>

{% for s in students %}
<tr> 
    <td>{{s.RollNo}}</td>
    <td>{{s.Name}}</td>
    <td>{{s.Branch}}</td>
</tr>
{% endfor %}

</table>
